<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        .bloc {
            border-bottom: 2px solid black;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px;
            position: fixed;
            width: 100%;
            top: 0;
        }
        body{
            padding-top: 100px;
        }
        .logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid black;

        }

        .menu {
            width: 35%;
            display: flex;
            justify-content: space-around;
        }

        .petitrectangle {
            width: 20%;
            height: 10px;
            border: 2px solid black;
            border-radius: 20px;

        }
        .grandrectangle{
            border: 2px  solid black;
            width: 75%;
            height: 300px;
            margin: 20px auto;
            border-radius: 10px;
        }
        .petitrec{
            border: 2px solid black;
            width: 20%;
            height: 15px;
            border-radius: 12px;
            margin: 20px auto;
        }
        .bloc1{
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: space-around;
        }
        .rectangle{
            border: 2px solid black;
            width: 45%;
            height: 200px;
            border-radius: 10px;
        }
        .bloc2{
             display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: space-around;
        }
        .rectangle1{
             border: 2px solid black;
            width: 40%;
            height: 100px;
            border-radius: 10px;
        }
        .bloc3{
             display: flex;
            justify-content: space-around;
        }
        .rectangle2{
             border: 2px solid black;
            width: 20%;
            height: 50px;
            border-radius: 10px;
        }
        .grandrectanglebas{
             border: 2px  solid black;
            width: 75%;
            height: 200px;
            margin: 20px auto;
            border-radius: 10px;
        }
        .petitcercle{
            width: 10%;
            height: 45px;
            border-radius: 12px;
            margin: 0 auto;
            justify-content: space-between   ;
            display: flex;
        }
        .cercle{
             width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid black;
        }
        .grandrectanglebas1{
             border: 2px  solid black;
            width: 75%;
            height: 40px;
            margin: 20px auto;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="bloc">
        <div class="logo"></div>
        <div class="menu">
            <div class="petitrectangle"></div>
            <div class="petitrectangle"></div>
            <div class="petitrectangle"></div>
            <div class="petitrectangle"></div>
        </div>
    </div>
    <div class="grandrectangle"></div>
    <div class="petitrec"></div>
    <div class="bloc1">
        <div class="rectangle"></div>
        <div class="rectangle"></div>
        <div class="rectangle"></div>
        <div class="rectangle"></div>
    </div>
     <div class="petitrec"></div>
     <div class="bloc2">
        <div class="rectangle1"></div>
        <div class="rectangle1"></div>
        <div class="rectangle1"></div>
        <div class="rectangle1"></div>
         <div class="rectangle1"></div>
        <div class="rectangle1"></div>
    </div>
    <div class="petitrec"></div>
     <div class="bloc3">
        <div class="rectangle2"></div>
        <div class="rectangle2"></div>
        <div class="rectangle2"></div>
        <div class="rectangle2"></div>
    </div>
    <div class="grandrectanglebas"></div>
<div class="petitcercle">
    <div class="cercle"></div>
     <div class="cercle"></div>
      <div class="cercle"></div>
       <div class="cercle"></div>

    </div>
     <div class="grandrectanglebas1"></div>
</body>

</html>
